<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            background-color: beige;
            color: black;
            text-align: center;
        }
        .peach-header {
            padding: 20px;
            background-color: goldenrod;
            border-bottom: 1px solid brown;
        }
        .ALbait-logo {
            max-width: 300px;
            height: auto;
        }
        .platinum-edition {
            max-width: 250px;
            margin: 50px auto;
            padding: 20px;
            background: silver;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(88, 19, 19, 0.05);
        }
        .product-image {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .alibaitPrice {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: silver;
            color: crimson;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s, color 0.3s;
        }
        .alibaitPrice:hover {
            background-color: maroon;
            color: cornflowerblue; 
        }
    </style>
</head>
<body>

    <header class="peach-header">
        <img src="Albait logo.png" alt="Albait logo.png" class="ALbait-logo">
    </header>

    <div class="platinum-edition">
        <h1>Albait Perfume</h1>
        
        <img src="platinum edition.png" alt="Platinum Edition" class="product-image">
        
        <p>sweet scented with a floral heart.</p>
        
        <h3 class="platinumPrice">$50</h3>
        
            <a href="products.html">click here to see the products</a>
    
    </div>
        
</body>
</html>
